<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheikh's Electronic</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0f;
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
border-bottom:2px solid #00ff99;
}

header h1{
font-size:35px;
color:#00ff99;
}

header p{
color:#aaa;
margin-top:10px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#141414;
border-radius:20px;
overflow:hidden;
transition:.3s;
border:1px solid #222;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px #00ff99;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.info{
padding:15px;
}

.info h3{
margin-bottom:10px;
}

.price{
color:#00ff99;
font-size:22px;
font-weight:bold;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
background:#00ff99;
border:none;
border-radius:10px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
color:#aaa;
}
</style>
</head>

<body>

<header>
<h1>Sheikh's Electronic</h1>
<p>Premium Gadgets • Watches • Pods • Tumblers</p>
</header>

<div class="products">

<div class="card">
<img src="watch.jpg">
<div class="info">
<h3>Rolex Style Smart Watch</h3>
<div class="price">Rs 4999</div>
<button>Add to Cart</button>
</div>
</div>

<div class="card">
<img src="tumbler.jpg">
<div class="info">
<h3>Premium Tumbler</h3>
<div class="price">Rs 3000</div>
<button>Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=800">
<div class="info">
<h3>Trendy Gadget</h3>
<div class="price">Rs 3499</div>
<button>Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6?w=800">
<div class="info">
<h3>Premium Pod Vape</h3>
<div class="price">Rs 2799</div>
<button>Add to Cart</button>
</div>
</div>

</div>

<footer>
© 2026 Sheikh's Electronic | Premium Online Store
</footer>

</body>
</html>
