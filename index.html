<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheikh's Electronic Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0f;
color:white;
}

header{
text-align:center;
padding:25px;
background:linear-gradient(90deg,#111,#1c1c1c);
}

header h1{
margin:0;
letter-spacing:3px;
}

header p{
color:#aaa;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#15151a;
padding:15px;
border-radius:15px;
border:1px solid #222;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
border-color:#00ff99;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#00ff99;
font-weight:bold;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#00ff99;
color:black;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>SHEIKH'S ELECTRONIC</h1>
<p>Premium Gadgets • Accessories • Lifestyle</p>
</header>

<div class="products">

<!-- TUMBLER -->
<div class="card">
<img src="https://images.unsplash.com/photo-1526401485004-2aa6c1e04e1a?auto=format&fit=crop&w=500&q=60">
<h3>Tumbler Bottle</h3>
<p class="price">Rs 1499</p>
<button>Add to Cart</button>
</div>

<!-- POD VAPE -->
<div class="card">
<img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6?auto=format&fit=crop&w=500&q=60">
<h3>Pod Vape</h3>
<p class="price">Rs 3999</p>
<button>Add to Cart</button>
</div>

<!-- HOME ACCESSORIES -->
<div class="card">
<img src="https://images.unsplash.com/photo-1484101403633-562f891dc89a?auto=format&fit=crop&w=500&q=60">
<h3>Home Accessories</h3>
<p class="price">Rs 2299</p>
<button>Add to Cart</button>
</div>

<!-- GADGET -->
<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=500&q=60">
<h3>Trendy Gadget</h3>
<p class="price">Rs 4499</p>
<button>Add to Cart</button>
</div>

</div>

</body>
</html>
