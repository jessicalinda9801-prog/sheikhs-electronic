<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheikh's Electronic Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0f;
color:white;
}

/* HEADER */
header{
text-align:center;
padding:25px;
background:linear-gradient(90deg,#111,#1c1c1c);
}

header h1{
margin:0;
letter-spacing:3px;
}

header p{
color:#aaa;
}

/* SEARCH */
.search{
text-align:center;
padding:15px;
}

.search input{
width:85%;
padding:12px;
border:none;
border-radius:10px;
outline:none;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#15151a;
padding:15px;
border-radius:15px;
border:1px solid #222;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
border-color:#00ff99;
}

.price{
color:#00ff99;
font-weight:bold;
}

/* BUTTON */
button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#00ff99;
color:black;
font-weight:bold;
cursor:pointer;
}

/* CART */
.cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#00ff99;
color:black;
padding:15px;
border-radius:50px;
cursor:pointer;
font-weight:bold;
}

.cart{
position:fixed;
top:0;
right:-100%;
width:320px;
height:100%;
background:#111;
padding:15px;
transition:0.3s;
overflow:auto;
border-left:1px solid #222;
}

.close{
background:red;
color:#fff;
border:none;
padding:5px 10px;
float:right;
cursor:pointer;
border-radius:5px;
}

.total{
margin-top:10px;
color:#00ff99;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>SHEIKH'S ELECTRONIC</h1>
<p>Premium • Aesthetic • Online Store</p>
</header>

<div class="search">
<input type="text" id="search" onkeyup="filter()" placeholder="Search products...">
</div><div class="card" data-name="tumbler">
  <h3>Tumbler Bottle</h3>
  <p class="price">Rs 1499</p>
  <button onclick="add('Tumbler Bottle',1499)">Add to Cart</button>
</div>

<div class="products">

<div class="card" data-name="tumbler">
<h3>Premium Tumbler</h3>
<p class="price">Rs 1499</p>
<button onclick="add('Premium Tumbler',1499)">Add to Cart</button>
</div>

<div class="card" data-name="pod vape">
<h3>Pod Vape</h3>
<p class="price">Rs 3999</p>
<button onclick="add('Pod Vape',3999)">Add to Cart</button>
</div>

<div class="card" data-name="home accessories">
<h3>Home Accessories Set</h3>
<p class="price">Rs 2299</p>
<button onclick="add('Home Set',2299)">Add to Cart</button>
</div>

<div class="card" data-name="gadget">
<h3>Trendy Gadget</h3>
<p class="price">Rs 4499</p>
<button onclick="add('Trendy Gadget',4499)">Add to Cart</button>
</div>

</div>

<div class="cartBtn" onclick="openCart()">🛒 Cart</div>

<div class="cart" id="cart">
<button class="close" onclick="closeCart()">X</button>
<h3>Your Cart</h3>
<div id="items"></div>
<div class="total" id="total"></div>
<br>
<button onclick="checkout()">Order on WhatsApp</button>
</div>

<script>

let cart=[];

function add(name,price){
cart.push({name,price});
alert(name+" added ✔");
}

function openCart(){
document.getElementById("cart").style.right="0";
render();
}

function closeCart(){
document.getElementById("cart").style.right="-100%";
}

function render(){
let html="";
let total=0;

cart.forEach((i,index)=>{
total+=i.price;
html+=`${index+1}. ${i.name} - Rs ${i.price}<br>`;
});

document.getElementById("items").innerHTML=html;
document.getElementById("total").innerHTML="Total: Rs "+total;
}

function checkout(){
let phone="923001234567";
let msg="Order:%0A";

cart.forEach(i=>{
msg+=i.name+" - "+i.price+"%0A";
});

window.open("https://wa.me/"+phone+"?text="+msg);
}

function filter(){
let input=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(card=>{
let name=card.getAttribute("data-name");
card.style.display=name.includes(input)?"block":"none";
});
}

</script>

</body>
</html>
